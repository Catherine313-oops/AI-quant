name: 每日数据更新

on:
  schedule:
    - cron: '30 8 * * 1-5'
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install tushare pandas numpy plotly

      - name: 运行每日更新
        run: python update_dashboard.py
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}

      - name: 提交并推送更新
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: 每日数据更新"
          commit_user_name: "Gold Turtle Bot"
          commit_user_email: "bot@example.com"
          branch: main
          file_pattern: "gold_turtle_dashboard.html"
